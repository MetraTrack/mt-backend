name: Deploy to Production

on:
  workflow_dispatch:

# Prevent concurrent deployments to main
concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false # Don't cancel in-progress deployments, queue instead

jobs:
  # ============================================
  # Job 1: Run Tests
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ============================================
  # Job 2: Build and Push Docker Image
  # ============================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.IMAGE_NAME }}:prod
            ${{ secrets.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed tags
        run: |
          echo "Successfully pushed Docker images:"
          echo "  - ${{ secrets.IMAGE_NAME }}:prod"
          echo "  - ${{ secrets.IMAGE_NAME }}:sha-${{ github.sha }}"

  # ============================================
  # Job 3: Deploy via Dokploy Webhooks
  # ============================================
  deploy:
    name: Deploy to Dokploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trigger migration webhook
        run: |
          echo "Triggering Dokploy migration webhook..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.DOKPLOY_BACKEND_MIGRATE_WEBHOOK_URL }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response body: $BODY"
          echo "HTTP status code: $HTTP_CODE"

          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "ERROR: Migration webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Migration webhook triggered successfully!"

      - name: Wait for migrations to complete
        run: |
          echo "Waiting 10 seconds for migrations to complete..."
          sleep 10
          echo "Done waiting."

      - name: Trigger backend deployment webhook
        run: |
          echo "Triggering Dokploy backend deployment webhook..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.DOKPLOY_BACKEND_WEBHOOK_URL }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response body: $BODY"
          echo "HTTP status code: $HTTP_CODE"

          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "ERROR: Backend deployment webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Backend deployment webhook triggered successfully!"

      - name: Deployment complete
        run: |
          echo "=========================================="
          echo "Deployment pipeline completed successfully!"
          echo "=========================================="
          echo ""
          echo "Image tags deployed:"
          echo "  - prod (mutable, latest production)"
          echo "  - sha-${{ github.sha }} (immutable, for rollback)"
          echo ""
          echo "Triggered webhooks:"
          echo "  1. Migration webhook"
          echo "  2. Backend deployment webhook"
          echo "=========================================="